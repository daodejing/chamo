# =============================================================================
# Frontend HelmRelease Patch for Oracle Cloud
# =============================================================================
# Updates image repository to OCIR and adds pull secrets.
#
# Note: Replace <region> and <namespace> with actual values after
# running `tofu apply`. The image automation will update the tag.
# =============================================================================

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ourchat-frontend
  namespace: flux-system
spec:
  values:
    image:
      repository: ap-osaka-1.ocir.io/axeavx1flryv/ourchat/frontend # {"$imagepolicy": "flux-system:ourchat-frontend:name"}
      tag: a027400-1768812043 # {"$imagepolicy": "flux-system:ourchat-frontend:tag"}
    imagePullSecrets:
      - name: ocir-secret
    # Production environment variables
    env:
      - name: NEXT_PUBLIC_GRAPHQL_HTTP_URL
        value: "https://api.ourchat.138-2-48-165.nip.io/graphql"
      - name: NEXT_PUBLIC_GRAPHQL_WS_URL
        value: "wss://api.ourchat.138-2-48-165.nip.io/graphql"
