# =============================================================================
# Backend HelmRelease Patch for Oracle Cloud
# =============================================================================
# Updates image repository to OCIR and adds production configuration.
#
# Note: Replace <region> and <namespace> with actual values after
# running `tofu apply`. The image automation will update the tag.
# =============================================================================

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ourchat-backend
  namespace: flux-system
spec:
  values:
    image:
      repository: ap-osaka-1.ocir.io/axeavx1flryv/ourchat/backend # {"$imagepolicy": "flux-system:ourchat-backend:name"}
      tag: 2177a1f-1769344919 # {"$imagepolicy": "flux-system:ourchat-backend:tag"}
    imagePullSecrets:
      - name: ocir-secret
    # Increase memory for NestJS + Prisma + GraphQL
    resources:
      limits:
        cpu: 500m
        memory: 768Mi
      requests:
        cpu: 200m
        memory: 512Mi
    # Production environment - use secrets
    envFrom:
      - secretRef:
          name: ourchat-secrets
    env:
      - name: NODE_ENV
        value: "production"
      - name: PORT
        value: "4000"
      - name: CORS_ALLOWED_ORIGINS
        value: "https://ourchat.138-2-48-165.nip.io,https://api.ourchat.138-2-48-165.nip.io"
      # Email (SMTP via Brevo)
      - name: SMTP_HOST
        value: "smtp-relay.brevo.com"
      - name: SMTP_PORT
        value: "587"
      # SMTP_USER and SMTP_PASS are in ourchat-secrets (via envFrom)
      - name: EMAIL_FROM
        value: "yoganick@gmail.com"
      - name: EMAIL_FROM_NAME
        value: "OurChat"
      - name: EMAIL_VERIFICATION_URL
        value: "https://ourchat.138-2-48-165.nip.io/verify-email"
      - name: APP_BASE_URL
        value: "https://ourchat.138-2-48-165.nip.io"
