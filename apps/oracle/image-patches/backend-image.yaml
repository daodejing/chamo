# =============================================================================
# Backend HelmRelease Patch for Oracle Cloud
# =============================================================================
# Updates image repository to OCIR and adds production configuration.
#
# Note: Replace <region> and <namespace> with actual values after
# running `tofu apply`. The image automation will update the tag.
# =============================================================================

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ourchat-backend
  namespace: flux-system
spec:
  values:
    image:
      # OCIR format: <region>.ocir.io/<namespace>/ourchat/backend
      # This will be automatically updated by Flux image automation
      repository: ap-osaka-1.ocir.io/axeavx1flryv/ourchat/backend
      tag: latest
    imagePullSecrets:
      - name: ocir-secret
    # Production environment - use secrets
    envFrom:
      - secretRef:
          name: ourchat-secrets
    env:
      - name: NODE_ENV
        value: "production"
      - name: PORT
        value: "4000"
      - name: CORS_ALLOWED_ORIGINS
        value: "http://ourchat.138-2-48-165.nip.io,http://api.ourchat.138-2-48-165.nip.io"
      # Email (SMTP via Brevo)
      - name: SMTP_HOST
        value: "smtp-relay.brevo.com"
      - name: SMTP_PORT
        value: "587"
      # SMTP_USER and SMTP_PASS are in ourchat-secrets (via envFrom)
      - name: EMAIL_FROM
        value: "noreply@ourchat.app"
      - name: EMAIL_FROM_NAME
        value: "OurChat"
      - name: EMAIL_VERIFICATION_URL
        value: "http://ourchat.138-2-48-165.nip.io/verify-email"
