# =============================================================================
# Flux Image Automation for Oracle Cloud (OCIR)
# =============================================================================
# Scans OCIR for new image tags and automatically updates HelmReleases.
# Same pattern as local k3d - uses <git-sha>-<timestamp> tag format.
# =============================================================================

---
# Image Repository - Frontend
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: ourchat-frontend
  namespace: flux-system
spec:
  image: ap-osaka-1.ocir.io/axeavx1flryv/ourchat/frontend
  interval: 1m
  secretRef:
    name: ocir-secret

---
# Image Repository - Backend
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: ourchat-backend
  namespace: flux-system
spec:
  image: ap-osaka-1.ocir.io/axeavx1flryv/ourchat/backend
  interval: 1m
  secretRef:
    name: ocir-secret

---
# Image Policy - Frontend
# Pattern: <git-sha>-<timestamp> (e.g., af0585f-1767924290)
# Strategy: Numerical ascending by timestamp (latest = highest)
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ourchat-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ourchat-frontend
  filterTags:
    pattern: '^[a-f0-9]+-(?P<ts>[0-9]+)$'
    extract: '$ts'
  policy:
    numerical:
      order: asc

---
# Image Policy - Backend
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ourchat-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ourchat-backend
  filterTags:
    pattern: '^[a-f0-9]+-(?P<ts>[0-9]+)$'
    extract: '$ts'
  policy:
    numerical:
      order: asc

---
# Image Update Automation
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        Auto-update Oracle images

        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./apps/oracle
    strategy: Setters
