# =============================================================================
# HTTPRoutes for Oracle Cloud (Kubernetes Gateway API)
# =============================================================================
# Routes traffic from the Kubernetes Gateway to application services.
# Uses nip.io wildcard DNS with the Oracle Load Balancer IP.
# =============================================================================

---
# Frontend HTTPRoute - ourchat.138-2-48-165.nip.io
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: ourchat
spec:
  parentRefs:
    - name: ourchat-gateway
      namespace: istio-ingress
  hostnames:
    - "ourchat.138-2-48-165.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ourchat-ourchat-frontend
          port: 3000

---
# Backend API HTTPRoute - api.ourchat.138-2-48-165.nip.io
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: ourchat
spec:
  parentRefs:
    - name: ourchat-gateway
      namespace: istio-ingress
  hostnames:
    - "api.ourchat.138-2-48-165.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ourchat-ourchat-backend
          port: 4000
