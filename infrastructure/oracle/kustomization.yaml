# =============================================================================
# Infrastructure Overlay for Oracle Cloud
# =============================================================================
# Uses Kubernetes Gateway API for ingress with TLS termination via
# cert-manager and Let's Encrypt. Does not use base/ingress (which uses
# legacy Istio Gateway API).
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Shared base infrastructure
  # TODO: Re-enable observability after OurChat is deployed
  # - ../base/observability
  # NOTE: Not using ../base/ingress - we use Kubernetes Gateway API instead
  # Oracle-specific resources
  - namespaces.yaml
  - postgres.yaml
  - postgres-backup.yaml
  # Gateway API + TLS (must be in order: service -> gateway -> routes)
  - gateway-service.yaml
  - cert-manager.yaml
  - httproutes.yaml
