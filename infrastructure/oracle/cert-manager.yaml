# =============================================================================
# Let's Encrypt ClusterIssuer with Gateway API HTTP-01 Solver
# =============================================================================
# Uses Kubernetes Gateway API for HTTP-01 challenges with Istio.
# =============================================================================

---
# Gateway for ACME HTTP-01 challenges (and production traffic)
# Note: Use specific hostnames, not wildcards, for HTTP-01 challenges
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ourchat-gateway
  namespace: istio-ingress
spec:
  gatewayClassName: istio
  listeners:
    # HTTP listener for frontend (and ACME challenges)
    - name: http-frontend
      port: 80
      protocol: HTTP
      hostname: "ourchat.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
    # HTTP listener for backend API (and ACME challenges)
    - name: http-api
      port: 80
      protocol: HTTP
      hostname: "api.ourchat.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
    # HTTP listener for line-llm (shared cluster, also for ACME challenges)
    - name: http-line-llm
      port: 80
      protocol: HTTP
      hostname: "line-llm.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener for line-llm
    - name: https-line-llm
      port: 443
      protocol: HTTPS
      hostname: "line-llm.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: line-llm-tls
            kind: Secret
    # HTTPS listener for frontend
    - name: https-frontend
      port: 443
      protocol: HTTPS
      hostname: "ourchat.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: ourchat-tls
            kind: Secret
    # HTTPS listener for backend API
    - name: https-api
      port: 443
      protocol: HTTPS
      hostname: "api.ourchat.138-2-48-165.nip.io"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - name: ourchat-tls
            kind: Secret

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ourchat.app
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: ourchat-gateway
                namespace: istio-ingress
                kind: Gateway

---
# Staging issuer for testing (higher rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@ourchat.app
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: ourchat-gateway
                namespace: istio-ingress
                kind: Gateway

---
# Certificate for ourchat nip.io domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ourchat-tls
  namespace: istio-ingress
spec:
  secretName: ourchat-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "ourchat.138-2-48-165.nip.io"
    - "api.ourchat.138-2-48-165.nip.io"

---
# Certificate for line-llm nip.io domain (shared cluster)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: line-llm-tls
  namespace: istio-ingress
spec:
  secretName: line-llm-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "line-llm.138-2-48-165.nip.io"
