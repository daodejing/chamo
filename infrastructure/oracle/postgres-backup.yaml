---
# PostgreSQL Backup PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: ourchat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# PostgreSQL Backup CronJob
# Runs daily at 2 AM, keeps last 7 backups
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: ourchat
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ourchat-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR=/backups
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="$BACKUP_DIR/ourchat_$TIMESTAMP.sql.gz"

                  echo "Starting backup at $(date)"

                  # Create backup with compression
                  pg_dump -h postgres -U postgres -d ourchat | gzip > "$BACKUP_FILE"

                  echo "Backup created: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

                  # Keep only last 7 backups
                  cd "$BACKUP_DIR"
                  ls -t ourchat_*.sql.gz | tail -n +8 | xargs -r rm -f

                  echo "Current backups:"
                  ls -lh "$BACKUP_DIR"/ourchat_*.sql.gz

                  echo "Backup completed at $(date)"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          restartPolicy: OnFailure
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
