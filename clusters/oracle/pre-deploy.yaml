# =============================================================================
# Pre-Deploy Kustomization for Oracle Cloud
# =============================================================================
# Runs database migrations before application deployment.
# The apps Kustomization depends on this completing successfully.
# =============================================================================

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pre-deploy
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/oracle/pre-deploy
  prune: true
  wait: true
  force: true
  # SOPS decryption for DATABASE_URL secret access
  decryption:
    provider: sops
    secretRef:
      name: sops-age
